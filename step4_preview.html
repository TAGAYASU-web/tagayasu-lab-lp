<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>

.box{background:#FAF7F2;padding:40px;width:420px;border-radius:12px;}
</style>
</head><body>
<div class="box"><svg viewBox="0 0 400 148" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:400px;margin:0 auto;">

  <!-- カード1: 対話WS — x=16, y=32, 68×70 -->

  <text x="136" y="130" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#7A7060">ひとつだけでOK</text>

  <!-- カード3: 予防ケア — x=188, y=32, 68×70 -->

  <!-- カード4: 余白づくり — x=270, y=32, 68×70 -->
